  <polygon points="124,36 156,68 124,68" fill="#ffcccc"/>
  <polygon points="124,36 156,36 156,68" fill="#ffd8d8"/>

  <!-- Líneas de texto -->
  <rect x="56" y="84" width="72" height="8" rx="4" fill="#f8a0a0"/>
